name: Publish Studies Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build static studies site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npx tsc --noEmit

      - name: Build studies site
        run: npm run build:studies

      - name: Validate Pages artifact
        run: |
          test -f dist/studies/index.html
          test -f dist/studies/kafka.html
          test -f dist/studies/kafka-challenges.html
          test -f dist/studies/videos/kafka-study-guide.mp4
          test -f dist/studies/labs/kafka/challenges/kafka-single-broker/index.html
          test -f dist/studies/labs/kafka/challenges/kafka-single-broker/systemic-verify.sh

      - name: Deployment summary
        run: |
          {
            echo "## Kafka Studies publication"
            echo ""
            echo "| Item | Status |"
            echo "| --- | --- |"
            echo "| TypeScript | Passed |"
            echo "| Static build | Passed |"
            echo "| Kafka study page | dist/studies/kafka.html |"
            echo "| Kafka challenges | dist/studies/kafka-challenges.html |"
            echo "| Lab viewer example | dist/studies/labs/kafka/challenges/kafka-single-broker/index.html |"
            echo ""
            echo "The artifact below is ready for GitHub Pages."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/studies

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
